id: marketing-cta
name: Marketing / CTA Page
version: v0.1.0
status: draft
owner: Aphrodite
approved_by: null
approved_on: null
intended_use: >
  Focused marketing pages whose job is driving one specific conversion or
  action, narrower in scope than a broad landing page.
non_goals:
  - Broad homepage or brand-introduction pages
  - Blog, editorial, or content-library pages
  - Pricing-table or multi-option comparison pages
ux_rationale: >
  A CTA page should reduce distraction and keep the user's attention on one
  decision. It trades breadth for conversion focus and should feel direct
  without becoming thin or untrustworthy.
allowed_variations:
  - Visual-first or copy-first hero emphasis
  - Different trust-signal styles near the CTA
  - Optional FAQ or objection-handling block
  - Lower-commitment secondary CTA below the primary path
required_sections:
  - Focused value statement and CTA above the fold
  - Supporting proof or visual context
  - Benefit or objection-handling section
  - Trust reinforcement near conversion point
screenshots:
  desktop: screenshots/desktop-draft.svg
  mobile: screenshots/mobile-draft.svg
figma_link: pending://add-before-preview
changelog:

id: onboarding-flow
name: Onboarding Flow
version: v0.1.0
status: draft
owner: Aphrodite
approved_by: null
approved_on: null
intended_use: >
  First-run user flows that help a new user understand the product, complete
  setup, and reach their first meaningful action with clarity and momentum.
non_goals:
  - Persistent in-app help systems or tooltip tours
  - Email onboarding sequences
  - Feature-announcement or upgrade flows
ux_rationale: >
  Good onboarding balances explanation with progress. Each step should feel
  achievable, keep the user oriented, and reduce hesitation without turning the
  flow into a lecture.
allowed_variations:
  - Linear steps or milestone-based grouping
  - Optional versus required steps by product context
  - Progress indicator style
  - Whether support copy or examples are embedded inline
required_sections:
  - Welcome or expectation-setting step
  - Setup or configuration step
  - Guided explanation of key product behavior
  - First meaningful action prompt
  - Completion and next-step state
screenshots:
  desktop: screenshots/desktop-draft.svg
  mobile: screenshots/mobile-draft.svg
figma_link: pending://add-before-preview
changelog:

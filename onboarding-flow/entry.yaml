id: onboarding-flow
name: Onboarding Flow
version: v0.2.0
status: draft
owner: Aphrodite
approved_by: null
approved_on: null
intended_use: >
  First-run activation flows that help a new user understand the product,
  complete essential setup, and reach a first meaningful action with clarity
  and momentum.
non_goals:
  - Persistent in-app help systems or tooltip tours
  - One-step auth, recovery, or verification flows
  - Feature-announcement or upgrade flows
ux_rationale: >
  Good onboarding balances explanation with progress. Each step should feel
  achievable, keep the user oriented, and reduce hesitation without turning the
  flow into a lecture or a dead-end setup tunnel.
allowed_variations:
  - Linear steps or milestone-based grouping
  - Optional versus required steps by product context
  - Progress indicator style
  - Whether support copy or examples are embedded inline
required_sections:
  - Expectation-setting entry step
  - Visible progress model
  - Current-step content area
  - Support or rationale area when needed
  - Forward, back, and skip behavior matched to step importance
  - Completion and next-step handoff
screenshots:
  desktop: screenshots/desktop-draft.svg
  mobile: screenshots/mobile-draft.svg
figma_link: pending://add-before-preview
changelog:
  - version: v0.2.0
    date: 2026-04-05
    changes: Clarified activation boundary and strengthened step/state expectations; canonical Figma source still missing
  - version: v0.1.0
